<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>价格提醒 — Invest Tracker</title>
  <link rel="icon" type="image/x-icon" href="icon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #111113;
      --surface: #18181B;
      --surface-2: #1F1F23;
      --border: #27272A;
      --border-strong: #3F3F46;
      --accent: #3B82F6;
      --accent-soft: rgba(59, 130, 246, 0.12);
      --text: #FAFAFA;
      --text-2: #A1A1AA;
      --text-3: #71717A;
      --success: #10B981;
      --success-soft: rgba(16, 185, 129, 0.12);
      --danger: #EF4444;
      --danger-soft: rgba(239, 68, 68, 0.12);
      --radius: 14px;
      --radius-sm: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, system-ui, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 15px;
      line-height: 1.55;
      min-height: 100vh;
      padding: 2rem 6% 5rem;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 1100px; margin: 0 auto; }

    header {
      display: flex; justify-content: space-between; align-items: center;
      padding-bottom: 1.2rem; border-bottom: 1px solid var(--border); margin-bottom: 3rem;
      gap: 1rem; flex-wrap: wrap;
    }
    .nav-wrap { display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap; }
    .lang-switch {
      display: inline-flex; background: var(--surface-2);
      border: 1px solid var(--border); border-radius: 999px; padding: 2px;
    }
    .lang-btn {
      background: transparent; border: none; color: var(--text-3);
      font-family: inherit; font-size: 0.72rem; font-weight: 600;
      padding: 0.3rem 0.65rem; border-radius: 999px; cursor: pointer;
      transition: all 0.15s; width: auto; letter-spacing: 0.04em;
    }
    .lang-btn:hover { color: var(--text); }
    .lang-btn.active { background: var(--accent); color: #fff; }
    .logo {
      font-weight: 700; font-size: 0.95rem; letter-spacing: 0.02em;
      display: flex; align-items: center; gap: 0.6rem; color: var(--text);
    }
    .logo-dot { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; display: inline-block; }
    .nav-links { display: flex; gap: 0.4rem; }
    .nav-links a {
      text-decoration: none; color: var(--text-2); font-size: 0.875rem;
      font-weight: 500; padding: 0.45rem 0.9rem; border-radius: var(--radius-sm);
      transition: color 0.15s, background 0.15s;
    }
    .nav-links a:hover { color: var(--text); background: var(--surface); }
    .nav-links a.active { color: var(--accent); background: var(--accent-soft); }

    .eyebrow {
      display: inline-block; font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--accent); background: var(--accent-soft);
      padding: 0.3rem 0.7rem; border-radius: var(--radius-sm); margin-bottom: 1.1rem;
    }
    h1 {
      font-size: clamp(1.8rem, 4vw, 2.5rem); font-weight: 700;
      letter-spacing: -0.02em; line-height: 1.15; margin-bottom: 0.7rem;
    }
    .lede { max-width: 640px; color: var(--text-2); font-size: 1rem; margin-bottom: 2rem; }

    .meta-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1.2rem; flex-wrap: wrap; gap: 1rem;
    }
    .last-check { font-size: 0.85rem; color: var(--text-3); }
    .last-check strong { color: var(--text); font-weight: 600; }
    .btn-link {
      text-decoration: none; color: var(--text-2); font-size: 0.82rem;
      font-weight: 500; padding: 0.4rem 0.8rem; border: 1px solid var(--border);
      border-radius: var(--radius-sm); transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .btn-link:hover { color: var(--text); border-color: var(--border-strong); background: var(--surface); }

    .ticker-grid { display: grid; gap: 1rem; margin-bottom: 3rem; }
    .ticker-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem 1.6rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1.5rem;
      align-items: center;
    }
    @media (max-width: 700px) { .ticker-card { grid-template-columns: 1fr; } }

    .ticker-head {
      display: flex; align-items: baseline; gap: 0.8rem; margin-bottom: 0.6rem;
      flex-wrap: wrap;
    }
    .ticker-name { font-size: 1.05rem; font-weight: 600; color: var(--text); }
    .ticker-sym {
      font-family: 'JetBrains Mono', monospace; font-size: 0.78rem;
      color: var(--text-3); letter-spacing: 0.04em;
    }
    .price-row { display: flex; align-items: baseline; gap: 0.8rem; margin-bottom: 0.9rem; }
    .price {
      font-family: 'JetBrains Mono', monospace; font-size: 1.8rem;
      font-weight: 500; color: var(--text); line-height: 1; letter-spacing: -0.01em;
    }
    .price.unknown { color: var(--text-3); font-size: 1rem; font-style: italic; }

    .thresholds { display: flex; gap: 1.3rem; font-size: 0.88rem; }
    .threshold-item {
      display: flex; align-items: center; gap: 0.5rem;
    }
    .threshold-label {
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--text-3);
    }
    .threshold-val { font-family: 'JetBrains Mono', monospace; font-weight: 500; color: var(--text); }
    .threshold-val.unset { color: var(--text-3); font-style: italic; }

    .status {
      padding: 0.5rem 1rem; border-radius: var(--radius-sm);
      font-size: 0.78rem; font-weight: 600; letter-spacing: 0.04em;
      text-align: center; min-width: 140px; border: 1px solid var(--border);
    }
    .status.ok { background: var(--surface-2); color: var(--text-2); }
    .status.low {
      background: var(--success-soft); color: var(--success); border-color: rgba(16, 185, 129, 0.3);
    }
    .status.high {
      background: var(--danger-soft); color: var(--danger); border-color: rgba(239, 68, 68, 0.3);
    }
    .status.unset { background: var(--surface-2); color: var(--text-3); }

    .help-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.6rem;
      margin-top: 2rem;
    }
    .help-card .card-title {
      font-size: 0.78rem; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--text-3); margin-bottom: 1rem;
      padding-bottom: 0.9rem; border-bottom: 1px solid var(--border);
    }
    .help-card ol { padding-left: 1.4rem; }
    .help-card li { margin-bottom: 0.5rem; color: var(--text-2); }
    .help-card code {
      font-family: 'JetBrains Mono', monospace;
      background: var(--surface-2); padding: 0.15rem 0.4rem;
      border: 1px solid var(--border); border-radius: 4px;
      font-size: 0.88em; color: var(--text);
    }
    .help-card a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .help-card a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo"><span class="logo-dot"></span>Invest Tracker</div>
      <div class="nav-wrap">
        <nav class="nav-links">
          <a href="index.html" data-i18n="nav_fire">FIRE 计算器</a>
          <a href="portfolio.html" data-i18n="nav_portfolio">投资组合</a>
          <a href="alerts.html" class="active" data-i18n="nav_alerts">价格提醒</a>
          <a href="library.html" data-i18n="nav_library">知识库</a>
          <a href="blog.html" data-i18n="nav_blog">博客</a>
        </nav>
        <div class="lang-switch">
          <button class="lang-btn" data-lang="zh">中</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
      </div>
    </header>

    <span class="eyebrow" data-i18n="alerts_eyebrow">实时</span>
    <h1 data-i18n="alerts_h1">价格提醒</h1>
    <p class="lede" data-i18n="alerts_lede">定时任务每个工作日检查 4 次,价格触及你设的低位/高位时邮件到你的收件箱。</p>

    <div class="meta-row">
      <div class="last-check" id="lastCheck" data-i18n="alerts_loading">加载中…</div>
      <a class="btn-link" href="https://github.com/huicnvictor/invest-tracker/actions/workflows/check-prices.yml" target="_blank" data-i18n="alerts_run_btn">立即检查 ↗</a>
    </div>

    <div class="ticker-grid" id="tickerGrid"></div>

    <div class="help-card">
      <div class="card-title" data-i18n="alerts_help_title">设置或修改阈值</div>
      <ol>
        <li><span data-i18n="alerts_help_1_pre">在 GitHub 上打开 </span><a href="https://github.com/huicnvictor/invest-tracker/edit/main/watchlist.json" target="_blank"><code>watchlist.json</code></a><span data-i18n="alerts_help_1_post">。</span></li>
        <li data-i18n="alerts_help_2">为每个股票填入 low 和 high(不需要的一侧留 null)。</li>
        <li data-i18n="alerts_help_3">提交。下次定时检查会使用新值。</li>
        <li><span data-i18n="alerts_help_4_pre">想立即检查,点击上方的「</span><strong data-i18n="alerts_help_run">立即检查</strong><span data-i18n="alerts_help_4_post">」。</span></li>
      </ol>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script>
    const CURRENCY_SYMBOLS = { EUR: '€', USD: '$', GBP: '£', HKD: 'HK$', CAD: 'C$', CNY: '¥', JPY: '¥' };
    let cachedData = null;

    function fmtPrice(price, currency) {
      const sym = CURRENCY_SYMBOLS[currency] || '';
      return sym + Number(price).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function fmtTime(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleString();
    }

    function statusFor(price, low, high) {
      if (price == null) return { cls: 'unset', text: t('alerts_status_nodata') };
      if (low == null && high == null) return { cls: 'unset', text: t('alerts_status_nothresh') };
      if (high != null && price >= high) return { cls: 'high', text: t('alerts_status_above') };
      if (low != null && price <= low) return { cls: 'low', text: t('alerts_status_below') };
      return { cls: 'ok', text: t('alerts_status_in') };
    }

    function render() {
      if (!cachedData) return;
      const { watchlist, state } = cachedData;
      const grid = document.getElementById('tickerGrid');
      grid.innerHTML = '';

      let latestCheck = null;

      for (const ticker of watchlist.tickers) {
        const st = state.tickers[ticker.symbol] || {};
        const price = st.last_price;
        const cur = ticker.currency || '';
        const status = statusFor(price, ticker.low, ticker.high);

        if (st.last_checked && (!latestCheck || st.last_checked > latestCheck)) {
          latestCheck = st.last_checked;
        }

        const lowStr = ticker.low != null
          ? `<span class="threshold-val">${fmtPrice(ticker.low, cur)}</span>`
          : `<span class="threshold-val unset">${t('alerts_unset')}</span>`;
        const highStr = ticker.high != null
          ? `<span class="threshold-val">${fmtPrice(ticker.high, cur)}</span>`
          : `<span class="threshold-val unset">${t('alerts_unset')}</span>`;

        const priceStr = price != null
          ? `<div class="price">${fmtPrice(price, cur)}</div>`
          : `<div class="price unknown">${t('alerts_waiting')}</div>`;

        const card = document.createElement('div');
        card.className = 'ticker-card';
        card.innerHTML = `
          <div>
            <div class="ticker-head">
              <div class="ticker-name">${ticker.name || ticker.symbol}</div>
              <div class="ticker-sym">${ticker.symbol} · ${cur}</div>
            </div>
            ${priceStr}
            <div class="thresholds">
              <div class="threshold-item"><span class="threshold-label">${t('alerts_low_label')}</span> ${lowStr}</div>
              <div class="threshold-item"><span class="threshold-label">${t('alerts_high_label')}</span> ${highStr}</div>
            </div>
          </div>
          <div class="status ${status.cls}">${status.text}</div>
        `;
        grid.appendChild(card);
      }

      const lastEl = document.getElementById('lastCheck');
      lastEl.removeAttribute('data-i18n');
      lastEl.innerHTML = latestCheck
        ? `${t('alerts_last_pre')}<strong>${fmtTime(latestCheck)}</strong>`
        : t('alerts_never');
    }

    async function loadData() {
      const [watchlist, state] = await Promise.all([
        fetch('./watchlist.json?t=' + Date.now()).then(r => r.json()),
        fetch('./state.json?t=' + Date.now()).then(r => r.json()).catch(() => ({ tickers: {} }))
      ]);
      cachedData = { watchlist, state };
      render();
    }

    document.addEventListener('i18n:change', render);
    loadData();
  </script>
</body>
</html>
