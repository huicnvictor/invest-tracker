<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIRE 计算器 — Invest Tracker</title>
  <link rel="icon" type="image/x-icon" href="icon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #111113;
      --surface: #18181B;
      --surface-2: #1F1F23;
      --border: #27272A;
      --border-strong: #3F3F46;
      --accent: #3B82F6;
      --accent-hover: #2563EB;
      --accent-soft: rgba(59, 130, 246, 0.12);
      --text: #FAFAFA;
      --text-2: #A1A1AA;
      --text-3: #71717A;
      --success: #10B981;
      --danger: #EF4444;
      --warning: #F59E0B;
      --radius: 14px;
      --radius-sm: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, system-ui, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 15px;
      line-height: 1.55;
      min-height: 100vh;
      padding: 2rem 6% 5rem;
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 1100px; margin: 0 auto; }

    /* ── HEADER ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 1.2rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3rem;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .nav-wrap { display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap; }
    .lang-switch {
      display: inline-flex; background: var(--surface-2);
      border: 1px solid var(--border); border-radius: 999px; padding: 2px;
    }
    .lang-btn {
      background: transparent; border: none; color: var(--text-3);
      font-family: inherit; font-size: 0.72rem; font-weight: 600;
      padding: 0.3rem 0.65rem; border-radius: 999px; cursor: pointer;
      transition: all 0.15s; width: auto; letter-spacing: 0.04em;
    }
    .lang-btn:hover { color: var(--text); }
    .lang-btn.active { background: var(--accent); color: #fff; }
    .logo {
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: var(--text);
    }
    .logo-dot {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      display: inline-block;
    }
    .nav-links { display: flex; gap: 0.4rem; }
    .nav-links a {
      text-decoration: none;
      color: var(--text-2);
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.45rem 0.9rem;
      border-radius: var(--radius-sm);
      transition: color 0.15s, background 0.15s;
    }
    .nav-links a:hover { color: var(--text); background: var(--surface); }
    .nav-links a.active {
      color: var(--accent);
      background: var(--accent-soft);
    }

    /* ── HERO ── */
    .hero { margin-bottom: 2.5rem; }
    .eyebrow {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-soft);
      padding: 0.3rem 0.7rem;
      border-radius: var(--radius-sm);
      margin-bottom: 1.1rem;
    }
    h1 {
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 0.7rem;
    }
    .hero p {
      max-width: 640px;
      color: var(--text-2);
      font-size: 1rem;
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1.1fr;
      gap: 1.5rem;
    }
    @media (max-width: 880px) { .grid { grid-template-columns: 1fr; } }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.6rem;
    }
    .card-title {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 1.4rem;
      padding-bottom: 0.9rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── FORM ── */
    .field { margin-bottom: 1.1rem; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-2);
      margin-bottom: 0.4rem;
    }
    input, select {
      width: 100%;
      padding: 0.65rem 0.8rem;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 500;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    select {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='%23A1A1AA'%3e%3cpath d='M4 6l4 4 4-4'/%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 0.7rem center;
      background-size: 16px;
      padding-right: 2.2rem;
    }
    .helper {
      font-size: 0.78rem;
      color: var(--text-3);
      margin-top: 0.35rem;
    }

    button {
      width: 100%;
      margin-top: 0.4rem;
      padding: 0.8rem 1rem;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      background: var(--accent);
      color: #fff;
      border: 1px solid var(--accent);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    button:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    button:active { transform: translateY(1px); }

    /* ── RESULTS ── */
    .result-empty {
      color: var(--text-3);
      padding: 2.5rem 0;
      text-align: center;
      font-size: 0.92rem;
    }
    .result-block { display: none; }
    .result-block.show { display: block; }

    .headline {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1.2rem;
      margin-bottom: 1.2rem;
    }
    .headline-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 0.4rem;
    }
    .headline-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.9rem;
      font-weight: 500;
      color: var(--accent);
      line-height: 1.1;
      letter-spacing: -0.01em;
    }
    .headline-sub {
      font-size: 0.88rem;
      margin-top: 0.4rem;
      color: var(--text-2);
    }

    .stat-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.7rem;
      margin-bottom: 0.7rem;
    }
    .stat {
      padding: 0.8rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
    }
    .stat-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 0.3rem;
    }
    .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--text);
    }

    .warning {
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.3);
      padding: 0.75rem 0.9rem;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    .success {
      background: rgba(16, 185, 129, 0.1);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.3);
      padding: 0.75rem 0.9rem;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    /* ── TABLE ── */
    .breakdown {
      margin-top: 2.5rem;
      display: none;
    }
    .breakdown.show { display: block; }
    .breakdown-title {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 1rem;
    }
    .table-wrap {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.88rem;
    }
    th, td {
      padding: 0.65rem 1rem;
      text-align: right;
      border-bottom: 1px solid var(--border);
    }
    th:first-child, td:first-child { text-align: left; }
    th {
      background: var(--surface-2);
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-3);
    }
    tr:last-child td { border-bottom: none; }
    tr:last-child td { color: var(--accent); font-weight: 600; }

    /* ── FOOTER ── */
    footer {
      margin-top: 4rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.82rem;
      color: var(--text-3);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <div class="logo">
        <span class="logo-dot"></span>
        Invest Tracker
      </div>
      <div class="nav-wrap">
        <nav class="nav-links">
          <a href="index.html" class="active" data-i18n="nav_fire">FIRE 计算器</a>
          <a href="portfolio.html" data-i18n="nav_portfolio">投资组合</a>
          <a href="alerts.html" data-i18n="nav_alerts">价格提醒</a>
          <a href="library.html" data-i18n="nav_library">知识库</a>
          <a href="blog.html" data-i18n="nav_blog">博客</a>
        </nav>
        <div class="lang-switch">
          <button class="lang-btn" data-lang="zh">中</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
      </div>
    </header>

    <section class="hero">
      <span class="eyebrow" data-i18n="fire_eyebrow">计算器</span>
      <h1 data-i18n="fire_h1">每年要投多少钱</h1>
      <p data-i18n="fire_lede">设好年龄、目标金额和 ETF，算出每年要存多少才能实现财务独立。</p>
    </section>

    <div class="grid">

      <div class="card">
        <div class="card-title" data-i18n="fire_plan_title">你的计划</div>

        <div class="field-row">
          <div class="field">
            <label for="currentAge" data-i18n="fire_currentAge">当前年龄</label>
            <input type="number" id="currentAge" value="30" min="10" max="100" />
          </div>
          <div class="field">
            <label for="targetAge" data-i18n="fire_targetAge">目标年龄</label>
            <input type="number" id="targetAge" value="55" min="11" max="100" />
          </div>
        </div>

        <div class="field">
          <label for="targetAmount" data-i18n="fire_targetAmount">目标金额 ($)</label>
          <input type="number" id="targetAmount" value="1500000" min="0" step="10000" />
          <div class="helper" data-i18n="fire_targetHelper">停止工作时希望持有的资产规模。</div>
        </div>

        <div class="field">
          <label for="principal" data-i18n="fire_principal">已投本金 ($)</label>
          <input type="number" id="principal" value="20000" min="0" step="1000" />
          <div class="helper" data-i18n="fire_principalHelper">当前账户余额,会继续复利。</div>
        </div>

        <div class="field">
          <label for="etf" data-i18n="fire_etf">ETF / 资产</label>
          <select id="etf">
            <option value="10">VOO — S&P 500 (~10%/yr historical)</option>
            <option value="13">QQQ — Nasdaq 100 (~13%/yr historical)</option>
            <option value="10" selected>VTI — Total US Market (~10%/yr)</option>
            <option value="8">VT — Total World (~8%/yr)</option>
            <option value="13">SXRV — iShares Nasdaq 100 UCITS (~13%/yr)</option>
            <option value="11">SCHD — Dividend Growth (~11%/yr)</option>
            <option value="4">BND — Bonds (~4%/yr)</option>
            <option value="custom">Custom rate…</option>
          </select>
        </div>

        <div class="field" id="customRateField" style="display:none;">
          <label for="customRate" data-i18n="fire_customRate">年化回报率 (%)</label>
          <input type="number" id="customRate" value="7" min="0" max="50" step="0.1" />
        </div>

        <div class="field">
          <label for="inflation" data-i18n="fire_inflation">通胀调整 (%)</label>
          <input type="number" id="inflation" value="0" min="0" max="20" step="0.1" />
          <div class="helper" data-i18n="fire_inflationHelper">设为 0 用名义数字; 用 2-3% 算实际购买力。</div>
        </div>

        <button id="calcBtn" data-i18n="fire_calc">计算</button>
      </div>

      <div class="card">
        <div class="card-title" data-i18n="fire_result_title">结果</div>
        <div id="resultEmpty" class="result-empty" data-i18n="fire_empty">填好计划后点击「计算」。</div>
        <div id="resultBlock" class="result-block">
          <div id="warningSlot"></div>
          <div class="headline">
            <div class="headline-label" data-i18n="fire_annual_label">每年投入</div>
            <div class="headline-value" id="annual">$0</div>
            <div class="headline-sub" id="monthly">≈ $0 / 月</div>
          </div>

          <div class="stat-row">
            <div class="stat">
              <div class="stat-label" data-i18n="fire_years_label">达成年限</div>
              <div class="stat-value" id="years">0</div>
            </div>
            <div class="stat">
              <div class="stat-label" data-i18n="fire_effRate_label">有效回报率</div>
              <div class="stat-value" id="effRate">0%</div>
            </div>
          </div>
          <div class="stat-row">
            <div class="stat">
              <div class="stat-label" data-i18n="fire_totalIn_label">总投入</div>
              <div class="stat-value" id="totalIn">$0</div>
            </div>
            <div class="stat">
              <div class="stat-label" data-i18n="fire_growth_label">总收益</div>
              <div class="stat-value" id="growth">$0</div>
            </div>
          </div>
        </div>
      </div>

    </div>

    <section class="breakdown" id="breakdown">
      <div class="breakdown-title" data-i18n="fire_breakdown">逐年明细</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-i18n="fire_th_year">年份</th>
              <th data-i18n="fire_th_age">年龄</th>
              <th data-i18n="fire_th_contributed">投入</th>
              <th data-i18n="fire_th_growth">收益</th>
              <th data-i18n="fire_th_total">总额</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>

    <footer>
      <div data-i18n="fire_footer_l">Invest Tracker · 个人工具</div>
      <div data-i18n="fire_footer_r">回报为历史平均值,不构成任何保证。</div>
    </footer>

  </div>

  <script src="i18n.js"></script>
  <script>
    const $ = id => document.getElementById(id);

    $('etf').addEventListener('change', e => {
      $('customRateField').style.display = e.target.value === 'custom' ? 'block' : 'none';
    });

    const fmt = n => '$' + Math.round(n).toLocaleString('en-US');

    function calc() {
      const ageNow = +$('currentAge').value;
      const ageGoal = +$('targetAge').value;
      const target = +$('targetAmount').value;
      const principal = +$('principal').value;
      const etfVal = $('etf').value;
      const rate = (etfVal === 'custom' ? +$('customRate').value : +etfVal) / 100;
      const infl = +$('inflation').value / 100;

      const warn = $('warningSlot');
      warn.innerHTML = '';

      if (ageGoal <= ageNow) {
        warn.innerHTML = '<div class="warning">' + t('fire_warn_age') + '</div>';
        $('resultEmpty').style.display = 'none';
        $('resultBlock').classList.add('show');
        $('breakdown').classList.remove('show');
        return;
      }

      const n = ageGoal - ageNow;
      const r = infl > 0 ? (1 + rate) / (1 + infl) - 1 : rate;

      const futurePrincipal = principal * Math.pow(1 + r, n);
      const remaining = target - futurePrincipal;

      let annual;
      let alreadyThere = false;

      if (remaining <= 0) {
        annual = 0;
        alreadyThere = true;
      } else if (Math.abs(r) < 1e-9) {
        annual = remaining / n;
      } else {
        annual = remaining * r / ((Math.pow(1 + r, n) - 1) * (1 + r));
      }

      $('resultEmpty').style.display = 'none';
      $('resultBlock').classList.add('show');

      if (alreadyThere) {
        warn.innerHTML = '<div class="success">' + t('fire_warn_ontrack') + '</div>';
      }

      $('annual').textContent = fmt(annual);
      $('monthly').textContent = '≈ ' + fmt(annual / 12) + t('fire_per_month');
      $('years').textContent = n + (n === 1 ? t('fire_yr') : t('fire_yrs'));
      $('effRate').textContent = (r * 100).toFixed(2) + '%' + (infl > 0 ? t('fire_real_suffix') : '');
      $('totalIn').textContent = fmt(principal + annual * n);

      const tbody = $('tableBody');
      tbody.innerHTML = '';
      let bal = principal;
      let contributed = principal;
      for (let i = 1; i <= n; i++) {
        bal += annual;
        contributed += annual;
        bal = bal * (1 + r);
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${i}</td>
          <td>${ageNow + i}</td>
          <td>${fmt(contributed)}</td>
          <td>${fmt(bal - contributed)}</td>
          <td>${fmt(bal)}</td>
        `;
        tbody.appendChild(tr);
      }
      $('growth').textContent = fmt(bal - (principal + annual * n));
      $('breakdown').classList.add('show');
    }

    $('calcBtn').addEventListener('click', calc);
    document.querySelectorAll('input').forEach(el => {
      el.addEventListener('keydown', e => { if (e.key === 'Enter') calc(); });
    });
    document.addEventListener('i18n:change', calc);
    calc();
  </script>
</body>
</html>
