name: Fetch Price History

on:
  schedule:
    # Once a day at 22:00 UTC (after US market close)
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Fetch history
        run: python scripts/fetch_history.py

      - name: Commit prices.json
        run: |
          if [ -n "$(git status --porcelain prices.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add prices.json
            git commit -m "chore: update daily price history"
            git push
          fi
