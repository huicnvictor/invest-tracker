<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Invest Tracker</title>
  <link rel="icon" type="image/x-icon" href="icon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #111113;
      --surface: #18181B;
      --surface-2: #1F1F23;
      --border: #27272A;
      --border-strong: #3F3F46;
      --accent: #3B82F6;
      --accent-hover: #2563EB;
      --accent-soft: rgba(59, 130, 246, 0.12);
      --text: #FAFAFA;
      --text-2: #A1A1AA;
      --text-3: #71717A;
      --danger: #EF4444;
      --danger-soft: rgba(239, 68, 68, 0.12);
      --success: #10B981;
      --warning: #F59E0B;
      --radius: 14px;
      --radius-sm: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.65;
      min-height: 100vh;
      padding: 2rem 6% 5rem;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 820px; margin: 0 auto; }

    /* ── HEADER ── */
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding-bottom: 1.2rem; border-bottom: 1px solid var(--border); margin-bottom: 3rem;
    }
    .logo {
      font-weight: 700; font-size: 0.95rem; letter-spacing: 0.02em;
      display: flex; align-items: center; gap: 0.6rem; color: var(--text);
      user-select: none;
    }
    .logo-dot {
      width: 18px; height: 18px; background: var(--accent);
      border-radius: 50%; display: inline-block; cursor: pointer;
      box-shadow: 0 0 0 0 var(--accent-soft);
      transition: box-shadow 0.18s, transform 0.18s;
    }
    .logo-dot:hover { box-shadow: 0 0 0 6px var(--accent-soft); transform: scale(1.08); }
    body.admin .logo-dot { background: var(--success); }
    .nav-links { display: flex; gap: 0.4rem; }
    .nav-links a {
      text-decoration: none; color: var(--text-2); font-size: 0.875rem;
      font-weight: 500; padding: 0.45rem 0.9rem; border-radius: var(--radius-sm);
      transition: color 0.15s, background 0.15s;
    }
    .nav-links a:hover { color: var(--text); background: var(--surface); }
    .nav-links a.active { color: var(--accent); background: var(--accent-soft); }

    /* ── HERO ── */
    .hero { margin-bottom: 2.5rem; }
    .eyebrow {
      display: inline-block; font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--accent); background: var(--accent-soft);
      padding: 0.3rem 0.7rem; border-radius: var(--radius-sm); margin-bottom: 1.1rem;
    }
    h1 {
      font-size: clamp(1.8rem, 4vw, 2.5rem); font-weight: 700;
      letter-spacing: -0.02em; line-height: 1.15; margin-bottom: 0.7rem;
    }
    .lede { max-width: 640px; color: var(--text-2); font-size: 1rem; }

    /* ── ADMIN BAR ── */
    .admin-bar {
      display: none;
      gap: 0.5rem; flex-wrap: wrap;
      padding: 0.85rem 1rem;
      background: var(--surface);
      border: 1px solid var(--accent-soft);
      border-radius: var(--radius-sm);
      margin-bottom: 1.5rem;
      align-items: center;
    }
    .admin-bar.show { display: flex; }
    .admin-label {
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--accent); margin-right: auto;
    }
    .btn {
      font-family: inherit; font-size: 0.85rem; font-weight: 500;
      padding: 0.45rem 0.85rem; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--surface-2);
      color: var(--text-2); cursor: pointer;
      transition: all 0.15s; line-height: 1;
    }
    .btn:hover { color: var(--text); border-color: var(--border-strong); background: var(--surface); }
    .btn-primary {
      background: var(--accent); border-color: var(--accent); color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: #fff; }
    .btn-danger { color: var(--danger); border-color: rgba(239,68,68,0.3); }
    .btn-danger:hover { background: var(--danger-soft); color: var(--danger); border-color: var(--danger); }

    /* ── FILTER ── */
    .filter-bar {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
      margin-bottom: 2rem; padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .chip {
      font-size: 0.78rem; font-weight: 500; color: var(--text-2);
      padding: 0.35rem 0.75rem; background: var(--surface);
      border: 1px solid var(--border); border-radius: 999px;
      cursor: pointer; transition: all 0.15s; font-family: inherit;
    }
    .chip:hover { color: var(--text); border-color: var(--border-strong); }
    .chip.active {
      color: var(--accent); background: var(--accent-soft);
      border-color: transparent;
    }

    /* ── POSTS ── */
    .posts { display: flex; flex-direction: column; gap: 1rem; }

    article.post {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.6rem 1.8rem;
      transition: border-color 0.15s;
    }
    article.post:hover { border-color: var(--border-strong); }

    .post-meta {
      display: flex; gap: 0.7rem; align-items: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem; color: var(--text-3);
      margin-bottom: 0.6rem; flex-wrap: wrap;
    }
    .post-tag {
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--accent); background: var(--accent-soft);
      padding: 0.2rem 0.55rem; border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif;
    }

    .post-title {
      font-size: 1.35rem; font-weight: 700;
      line-height: 1.3; letter-spacing: -0.01em;
      margin-bottom: 0.5rem; color: var(--text);
    }
    .post-excerpt { color: var(--text-2); font-size: 0.95rem; margin-bottom: 1rem; }

    .post-actions { display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; }
    .read-toggle {
      display: inline-flex; align-items: center; gap: 0.3rem;
      background: none; border: none; padding: 0;
      color: var(--accent); font-size: 0.88rem; font-weight: 500;
      cursor: pointer; font-family: inherit;
    }
    .read-toggle::after { content: '→'; transition: transform 0.2s; margin-left: 0.2rem; }
    .read-toggle.open::after { transform: rotate(90deg); }
    .admin-only { display: none; }
    body.admin .admin-only { display: inline-flex; }

    .post-body {
      display: none;
      color: var(--text-2);
      font-size: 0.95rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      margin-top: 1rem;
    }
    .post-body.show { display: block; }
    .post-body p { margin-bottom: 0.9rem; color: var(--text-2); }
    .post-body p:last-child { margin-bottom: 0; }
    .post-body h3 {
      font-size: 1rem; font-weight: 600;
      color: var(--text); margin: 1.4rem 0 0.6rem;
    }
    .post-body h3:first-child { margin-top: 0; }
    .post-body ul, .post-body ol { padding-left: 1.3rem; margin-bottom: 0.9rem; }
    .post-body li { margin-bottom: 0.35rem; color: var(--text-2); }
    .post-body code {
      font-family: 'JetBrains Mono', monospace; font-size: 0.85em;
      background: var(--surface-2); padding: 0.1rem 0.4rem;
      border-radius: 4px; color: var(--text);
    }
    .post-body strong { color: var(--text); font-weight: 600; }
    .post-body a { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--accent-soft); }
    .post-body a:hover { border-bottom-color: var(--accent); }

    /* ── EMPTY ── */
    .empty {
      color: var(--text-3); text-align: center;
      padding: 3rem 0; font-size: 0.92rem;
    }

    /* ── TRASH VIEW ── */
    .trash-view { display: none; }
    .trash-view.show { display: block; }
    .trash-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 1.2rem; gap: 1rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); margin-bottom: 0.6rem;
    }
    .trash-info { flex: 1; min-width: 0; }
    .trash-title { font-weight: 600; color: var(--text); margin-bottom: 0.2rem; }
    .trash-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem; color: var(--text-3);
    }
    .trash-actions { display: flex; gap: 0.4rem; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100; padding: 2rem 1rem;
      overflow-y: auto;
      align-items: flex-start; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%; max-width: 680px;
      padding: 2rem;
      margin: auto 0;
    }
    .modal-title {
      font-size: 1.1rem; font-weight: 700; color: var(--text);
      margin-bottom: 1.5rem; padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1.1rem; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
    label {
      display: block; font-size: 0.78rem; font-weight: 500;
      color: var(--text-2); margin-bottom: 0.4rem;
    }
    input[type=text], input[type=date], textarea {
      width: 100%; padding: 0.6rem 0.8rem;
      font-family: inherit; font-size: 0.92rem;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    textarea { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; line-height: 1.55; resize: vertical; }
    textarea.body-area { min-height: 280px; }
    textarea.excerpt-area { min-height: 70px; font-family: inherit; font-size: 0.92rem; }
    input:focus, textarea:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .helper { font-size: 0.75rem; color: var(--text-3); margin-top: 0.35rem; }
    .modal-actions {
      display: flex; gap: 0.6rem; justify-content: flex-end;
      margin-top: 1.5rem; padding-top: 1.2rem;
      border-top: 1px solid var(--border);
    }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 1.5rem; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface); border: 1px solid var(--border);
      padding: 0.7rem 1.2rem; border-radius: var(--radius-sm);
      font-size: 0.88rem; color: var(--text);
      opacity: 0; transition: all 0.25s;
      z-index: 200; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.warning { border-color: var(--warning); color: var(--warning); }
    .toast.danger { border-color: var(--danger); color: var(--danger); }

    /* ── FOOTER ── */
    footer {
      margin-top: 4rem; padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.82rem; color: var(--text-3);
      display: flex; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem;
    }
    .dirty-indicator {
      display: none;
      font-size: 0.78rem; color: var(--warning);
      padding: 0.3rem 0.6rem;
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: var(--radius-sm);
    }
    body.dirty .dirty-indicator { display: inline-block; }

    /* ── PASSWORD MODAL ── */
    .pw-row {
      position: relative;
    }
    .pw-row input {
      padding-right: 2.4rem;
    }
    .pw-toggle {
      position: absolute; right: 0.5rem; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; padding: 0.35rem;
      cursor: pointer; color: var(--text-3);
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px;
    }
    .pw-toggle:hover { color: var(--text); background: var(--surface-2); }
    .pw-toggle svg { width: 18px; height: 18px; }

    /* ── EDITOR TOOLBAR ── */
    .editor-toolbar {
      display: flex; gap: 0.4rem; flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }
    .tool-btn {
      font-family: inherit; font-size: 0.82rem; font-weight: 500;
      padding: 0.4rem 0.7rem; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--surface-2);
      color: var(--text-2); cursor: pointer;
      display: inline-flex; align-items: center; gap: 0.35rem;
      transition: all 0.15s;
    }
    .tool-btn:hover { color: var(--text); border-color: var(--border-strong); }
    .tool-btn.recording { color: var(--danger); border-color: var(--danger); }
    .tool-btn.recording::before {
      content: ''; width: 8px; height: 8px;
      background: var(--danger); border-radius: 50%;
      animation: pulse 1s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .post-body img {
      max-width: 100%; height: auto;
      border-radius: var(--radius-sm);
      margin: 0.6rem 0;
      border: 1px solid var(--border);
    }
    .post-body audio {
      width: 100%; margin: 0.6rem 0;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <div class="logo">
        <span class="logo-dot" id="logoDot" title="双击进入管理模式"></span>
        Invest Tracker
      </div>
      <nav class="nav-links">
        <a href="index.html">FIRE</a>
        <a href="alerts.html">Alerts</a>
        <a href="library.html">Library</a>
        <a href="blog.html" class="active">Blog</a>
      </nav>
    </header>

    <section class="hero">
      <span class="eyebrow">Notes</span>
      <h1>投资 & 工具笔记</h1>
      <p class="lede">记录自己用过的投资软件、踩过的坑、还在打磨的想法。不是建议，是日志。</p>
    </section>

    <div class="admin-bar" id="adminBar">
      <span class="admin-label">管理模式</span>
      <span class="dirty-indicator">有未导出的改动</span>
      <button class="btn btn-primary" id="newPostBtn">+ 新文章</button>
      <button class="btn" id="trashBtn">垃圾箱 <span id="trashCount"></span></button>
      <button class="btn" id="exportBtn">导出 posts.js</button>
      <button class="btn" id="resetBtn" title="清空本地修改，重新从 posts.js 加载">重置</button>
      <button class="btn btn-danger" id="logoutBtn">退出</button>
    </div>

    <!-- POSTS VIEW -->
    <div id="postsView">
      <div class="filter-bar" id="filterBar"></div>
      <div class="posts" id="posts"></div>
      <div class="empty" id="empty" style="display:none;">还没有文章。</div>
    </div>

    <!-- TRASH VIEW -->
    <div class="trash-view" id="trashView">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
        <h2 style="font-size:1.2rem; font-weight:700;">垃圾箱</h2>
        <button class="btn" id="backFromTrashBtn">← 返回文章</button>
      </div>
      <div id="trashList"></div>
      <div class="empty" id="trashEmpty" style="display:none;">垃圾箱是空的。</div>
    </div>

    <footer>
      <div>Invest Tracker · personal notes</div>
      <div>纯个人记录，不构成任何投资建议。</div>
    </footer>

  </div>

  <!-- EDIT MODAL -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-title" id="editModalTitle">新文章</div>
      <input type="hidden" id="editId" />
      <div class="field-row">
        <div class="field">
          <label for="editDate">日期</label>
          <input type="date" id="editDate" />
        </div>
        <div class="field">
          <label for="editTags">标签（逗号分隔）</label>
          <input type="text" id="editTags" placeholder="软件, 工具" />
        </div>
      </div>
      <div class="field">
        <label for="editTitle">标题</label>
        <input type="text" id="editTitle" />
      </div>
      <div class="field">
        <label for="editExcerpt">摘要</label>
        <textarea id="editExcerpt" class="excerpt-area"></textarea>
        <div class="helper">列表页和文章顶部显示的一两句话。</div>
      </div>
      <div class="field">
        <label for="editBody">正文（HTML）</label>
        <div class="editor-toolbar">
          <button type="button" class="tool-btn" id="insertImgBtn" title="插入图片">🖼 图片</button>
          <button type="button" class="tool-btn" id="insertAudioBtn" title="插入音频文件">🎵 音频</button>
          <button type="button" class="tool-btn" id="recordBtn" title="录音">🎙 录音</button>
          <button type="button" class="tool-btn" id="insertH3Btn" title="插入小标题">H3</button>
          <button type="button" class="tool-btn" id="insertPBtn" title="插入段落">P</button>
          <button type="button" class="tool-btn" id="insertListBtn" title="插入列表">• 列表</button>
          <input type="file" id="imgFileInput" accept="image/*" style="display:none;">
          <input type="file" id="audioFileInput" accept="audio/*" style="display:none;">
        </div>
        <textarea id="editBody" class="body-area" placeholder="&lt;h3&gt;小标题&lt;/h3&gt;&#10;&lt;p&gt;段落内容&lt;/p&gt;&#10;&lt;ul&gt;&#10;  &lt;li&gt;条目&lt;/li&gt;&#10;&lt;/ul&gt;"></textarea>
        <div class="helper">支持 h3、p、ul、ol、li、code、strong、a、img、audio。图片/音频会以 base64 内嵌，文件大小直接影响 posts.js 体积。</div>
      </div>
      <div class="modal-actions">
        <button class="btn" id="cancelEditBtn">取消</button>
        <button class="btn btn-primary" id="saveEditBtn">保存</button>
      </div>
    </div>
  </div>

  <!-- PASSWORD MODAL -->
  <div class="modal-overlay" id="pwModal">
    <div class="modal" style="max-width: 380px;">
      <div class="modal-title" id="pwTitle">管理员登录</div>
      <div class="field">
        <label for="pwInput" id="pwLabel">密码</label>
        <div class="pw-row">
          <input type="password" id="pwInput" autocomplete="current-password" />
          <button type="button" class="pw-toggle" id="pwToggle" title="显示/隐藏密码" aria-label="切换密码可见">
            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>
      <div class="field" id="pwConfirmField" style="display:none;">
        <label for="pwConfirm">再输一次确认</label>
        <div class="pw-row">
          <input type="password" id="pwConfirm" autocomplete="new-password" />
        </div>
      </div>
      <div class="helper" id="pwHelper" style="margin-top:-0.6rem; margin-bottom:0.8rem;"></div>
      <div class="modal-actions">
        <button class="btn" id="pwCancelBtn">取消</button>
        <button class="btn btn-primary" id="pwSubmitBtn">确认</button>
      </div>
    </div>
  </div>

  <!-- RECORDER MODAL -->
  <div class="modal-overlay" id="recModal">
    <div class="modal" style="max-width: 420px; text-align: center;">
      <div class="modal-title">录音</div>
      <div id="recTime" style="font-family:'JetBrains Mono',monospace; font-size:2rem; color:var(--text); margin: 1rem 0;">00:00</div>
      <div style="display:flex; gap:0.6rem; justify-content:center; margin-bottom:1rem;">
        <button class="btn btn-primary" id="recStartBtn">开始</button>
        <button class="btn btn-danger" id="recStopBtn" style="display:none;">停止</button>
      </div>
      <audio id="recPreview" controls style="width:100%; display:none; margin-bottom:1rem;"></audio>
      <div class="modal-actions">
        <button class="btn" id="recCancelBtn">取消</button>
        <button class="btn btn-primary" id="recInsertBtn" style="display:none;">插入</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="posts.js"></script>
  <script>
    'use strict';

    const LS_DATA = 'blog_data_v1';
    const LS_HASH = 'blog_admin_hash_v1';
    const SESS_AUTH = 'blog_admin_session';

    const $ = id => document.getElementById(id);
    const el = (tag, props = {}, html) => {
      const e = document.createElement(tag);
      Object.assign(e, props);
      if (html != null) e.innerHTML = html;
      return e;
    };

    let state = { posts: [], trash: [] };
    let dirty = false;
    let activeTag = 'all';

    /* ───── Storage ───── */

    function loadData() {
      const local = localStorage.getItem(LS_DATA);
      if (local) {
        try {
          state = JSON.parse(local);
          dirty = true;
          document.body.classList.add('dirty');
          return;
        } catch {}
      }
      if (window.BLOG_DATA) {
        state = JSON.parse(JSON.stringify(window.BLOG_DATA));
      } else {
        toast('无法加载 posts.js', 'danger');
      }
    }

    function persist() {
      try {
        localStorage.setItem(LS_DATA, JSON.stringify(state));
      } catch (err) {
        toast('localStorage 满了：图片/音频太大。请先导出 posts.js 备份，然后删除一些大附件。', 'danger');
        return;
      }
      dirty = true;
      document.body.classList.add('dirty');
    }

    /* ───── Render ───── */

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }

    function fmtDate(d) {
      return d || '';
    }

    function allTags() {
      const set = new Set();
      state.posts.forEach(p => (p.tags || []).forEach(t => set.add(t)));
      return Array.from(set);
    }

    function renderFilter() {
      const bar = $('filterBar');
      bar.innerHTML = '';
      const allBtn = el('button', { className: 'chip' + (activeTag === 'all' ? ' active' : '') }, '全部');
      allBtn.dataset.tag = 'all';
      bar.appendChild(allBtn);
      allTags().forEach(t => {
        const b = el('button', { className: 'chip' + (activeTag === t ? ' active' : '') }, escapeHtml(t));
        b.dataset.tag = t;
        bar.appendChild(b);
      });
      bar.querySelectorAll('.chip').forEach(c => {
        c.addEventListener('click', () => {
          activeTag = c.dataset.tag;
          renderFilter();
          renderPosts();
        });
      });
    }

    function renderPosts() {
      const list = $('posts');
      list.innerHTML = '';
      const sorted = [...state.posts].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      const filtered = activeTag === 'all'
        ? sorted
        : sorted.filter(p => (p.tags || []).includes(activeTag));

      $('empty').style.display = filtered.length === 0 ? 'block' : 'none';

      filtered.forEach(p => {
        const art = el('article', { className: 'post' });
        const primaryTag = (p.tags && p.tags[0]) || '';
        art.innerHTML = `
          <div class="post-meta">
            <span>${escapeHtml(fmtDate(p.date))}</span>
            ${primaryTag ? `<span class="post-tag">${escapeHtml(primaryTag)}</span>` : ''}
          </div>
          <h2 class="post-title">${escapeHtml(p.title || '')}</h2>
          <p class="post-excerpt">${escapeHtml(p.excerpt || '')}</p>
          <div class="post-actions">
            <button class="read-toggle">展开</button>
            <button class="btn admin-only edit-btn">编辑</button>
            <button class="btn btn-danger admin-only delete-btn">删除</button>
          </div>
          <div class="post-body">${p.body || ''}</div>
        `;
        const toggle = art.querySelector('.read-toggle');
        const body = art.querySelector('.post-body');
        toggle.addEventListener('click', () => {
          const open = body.classList.toggle('show');
          toggle.classList.toggle('open', open);
          toggle.textContent = open ? '收起' : '展开';
        });
        art.querySelector('.edit-btn').addEventListener('click', () => openEdit(p.id));
        art.querySelector('.delete-btn').addEventListener('click', () => deletePost(p.id));
        list.appendChild(art);
      });
    }

    function renderTrash() {
      const list = $('trashList');
      list.innerHTML = '';
      $('trashEmpty').style.display = state.trash.length === 0 ? 'block' : 'none';
      $('trashCount').textContent = state.trash.length ? `(${state.trash.length})` : '';

      [...state.trash]
        .sort((a, b) => (b.deletedAt || '').localeCompare(a.deletedAt || ''))
        .forEach(p => {
          const item = el('div', { className: 'trash-item' });
          item.innerHTML = `
            <div class="trash-info">
              <div class="trash-title">${escapeHtml(p.title || '(无标题)')}</div>
              <div class="trash-meta">原日期 ${escapeHtml(p.date || '?')} · 删除于 ${escapeHtml((p.deletedAt || '').slice(0,10))}</div>
            </div>
            <div class="trash-actions">
              <button class="btn restore-btn">恢复</button>
              <button class="btn btn-danger purge-btn">永久删除</button>
            </div>
          `;
          item.querySelector('.restore-btn').addEventListener('click', () => restorePost(p.id));
          item.querySelector('.purge-btn').addEventListener('click', () => purgePost(p.id));
          list.appendChild(item);
        });
    }

    /* ───── CRUD ───── */

    function newId() {
      return 'p-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 7);
    }

    function openEdit(id) {
      const isNew = !id;
      const p = isNew ? null : state.posts.find(x => x.id === id);
      $('editModalTitle').textContent = isNew ? '新文章' : '编辑文章';
      $('editId').value = isNew ? '' : id;
      $('editDate').value = isNew ? new Date().toISOString().slice(0,10) : (p.date || '');
      $('editTags').value = isNew ? '' : (p.tags || []).join(', ');
      $('editTitle').value = isNew ? '' : (p.title || '');
      $('editExcerpt').value = isNew ? '' : (p.excerpt || '');
      $('editBody').value = isNew ? '' : (p.body || '');
      $('editModal').classList.add('show');
      setTimeout(() => $('editTitle').focus(), 50);
    }

    function closeEdit() {
      $('editModal').classList.remove('show');
    }

    function saveEdit() {
      const id = $('editId').value;
      const data = {
        date: $('editDate').value,
        tags: $('editTags').value.split(',').map(s => s.trim()).filter(Boolean),
        title: $('editTitle').value.trim(),
        excerpt: $('editExcerpt').value.trim(),
        body: $('editBody').value
      };
      if (!data.title) { toast('标题不能为空', 'warning'); return; }
      if (id) {
        const i = state.posts.findIndex(p => p.id === id);
        if (i >= 0) state.posts[i] = { ...state.posts[i], ...data };
      } else {
        state.posts.unshift({ id: newId(), ...data });
      }
      persist();
      closeEdit();
      renderFilter();
      renderPosts();
      toast(id ? '已更新' : '已新建', 'success');
    }

    function deletePost(id) {
      const i = state.posts.findIndex(p => p.id === id);
      if (i < 0) return;
      const [p] = state.posts.splice(i, 1);
      p.deletedAt = new Date().toISOString();
      state.trash.unshift(p);
      persist();
      renderFilter();
      renderPosts();
      renderTrash();
      toast('已移入垃圾箱', 'warning');
    }

    function restorePost(id) {
      const i = state.trash.findIndex(p => p.id === id);
      if (i < 0) return;
      const [p] = state.trash.splice(i, 1);
      delete p.deletedAt;
      state.posts.unshift(p);
      persist();
      renderFilter();
      renderPosts();
      renderTrash();
      toast('已恢复', 'success');
    }

    function purgePost(id) {
      if (!confirm('永久删除？此操作不可恢复（导出 posts.json 并 push 后即彻底从仓库中消失）。')) return;
      state.trash = state.trash.filter(p => p.id !== id);
      persist();
      renderTrash();
      toast('已永久删除', 'danger');
    }

    /* ───── Export / Reset ───── */

    function exportJson() {
      const clean = {
        version: 1,
        posts: state.posts.map(({ id, date, tags, title, excerpt, body }) => ({ id, date, tags, title, excerpt, body })),
        trash: state.trash
      };
      const header = '// Blog data. Edit through blog.html in admin mode (双击 logo 圆点),\n// then click "导出 posts.js" to download an updated version and commit it.\n';
      const text = header + 'window.BLOG_DATA = ' + JSON.stringify(clean, null, 2) + ';\n';
      const blob = new Blob([text], { type: 'application/javascript' });
      const url = URL.createObjectURL(blob);
      const a = el('a', { href: url, download: 'posts.js' });
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
      toast('已下载 posts.js。覆盖项目里的同名文件后 commit & push。', 'success');
    }

    function resetLocal() {
      if (!confirm('清空本地所有未导出的修改，重新从 posts.js 加载？')) return;
      localStorage.removeItem(LS_DATA);
      dirty = false;
      document.body.classList.remove('dirty');
      location.reload();
    }

    /* ───── Admin auth ───── */

    async function sha256(text) {
      const buf = new TextEncoder().encode(text);
      const hash = await crypto.subtle.digest('SHA-256', buf);
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function openPwModal({ title, helper, needConfirm, onSubmit }) {
      $('pwTitle').textContent = title;
      $('pwHelper').textContent = helper || '';
      $('pwConfirmField').style.display = needConfirm ? 'block' : 'none';
      $('pwInput').value = '';
      $('pwConfirm').value = '';
      $('pwInput').type = 'password';
      $('pwConfirm').type = 'password';
      setEyeState(false);
      $('pwModal').classList.add('show');
      setTimeout(() => $('pwInput').focus(), 50);

      const submit = async () => {
        const pw = $('pwInput').value;
        if (!pw) { toast('请输入密码', 'warning'); return; }
        if (needConfirm && pw !== $('pwConfirm').value) {
          toast('两次输入不一致', 'danger'); return;
        }
        const ok = await onSubmit(pw);
        if (ok) closePwModal();
      };
      const cancel = () => closePwModal();
      $('pwSubmitBtn').onclick = submit;
      $('pwCancelBtn').onclick = cancel;
      $('pwInput').onkeydown = e => { if (e.key === 'Enter') needConfirm ? $('pwConfirm').focus() : submit(); };
      $('pwConfirm').onkeydown = e => { if (e.key === 'Enter') submit(); };
    }

    function closePwModal() {
      $('pwModal').classList.remove('show');
      $('pwInput').value = '';
      $('pwConfirm').value = '';
    }

    function setEyeState(visible) {
      const path = visible
        ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
      $('eyeIcon').innerHTML = path;
    }

    function togglePwVisible() {
      const next = $('pwInput').type === 'password' ? 'text' : 'password';
      $('pwInput').type = next;
      $('pwConfirm').type = next;
      setEyeState(next === 'text');
    }

    function tryUnlock() {
      const stored = localStorage.getItem(LS_HASH);
      if (!stored) {
        openPwModal({
          title: '首次进入管理模式',
          helper: '设置一个密码，之后访问时用它解锁。',
          needConfirm: true,
          onSubmit: async (pw) => {
            const hash = await sha256(pw);
            localStorage.setItem(LS_HASH, hash);
            enterAdmin();
            toast('密码已设置，进入管理模式', 'success');
            return true;
          }
        });
      } else {
        openPwModal({
          title: '管理员登录',
          helper: '',
          needConfirm: false,
          onSubmit: async (pw) => {
            const hash = await sha256(pw);
            if (hash !== stored) { toast('密码错误', 'danger'); return false; }
            enterAdmin();
            return true;
          }
        });
      }
    }

    function enterAdmin() {
      sessionStorage.setItem(SESS_AUTH, '1');
      document.body.classList.add('admin');
      $('adminBar').classList.add('show');
    }

    function logout() {
      sessionStorage.removeItem(SESS_AUTH);
      document.body.classList.remove('admin');
      $('adminBar').classList.remove('show');
      showPostsView();
      toast('已退出管理模式');
    }

    /* ───── Trash view toggle ───── */

    function showTrashView() {
      $('postsView').style.display = 'none';
      $('trashView').classList.add('show');
      renderTrash();
    }
    function showPostsView() {
      $('postsView').style.display = '';
      $('trashView').classList.remove('show');
    }

    /* ───── Editor toolbar ───── */

    function insertAtCursor(text) {
      const ta = $('editBody');
      const start = ta.selectionStart;
      const end = ta.selectionEnd;
      const before = ta.value.slice(0, start);
      const after = ta.value.slice(end);
      const needLeadingNl = before && !before.endsWith('\n');
      const needTrailingNl = after && !after.startsWith('\n');
      const out = (needLeadingNl ? '\n' : '') + text + (needTrailingNl ? '\n' : '');
      ta.value = before + out + after;
      const cursor = start + out.length;
      ta.focus();
      ta.setSelectionRange(cursor, cursor);
    }

    function fileToDataURL(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result);
        r.onerror = reject;
        r.readAsDataURL(file);
      });
    }

    function fmtSize(n) {
      if (n < 1024) return n + ' B';
      if (n < 1024*1024) return (n/1024).toFixed(1) + ' KB';
      return (n/1024/1024).toFixed(1) + ' MB';
    }

    async function handleImageFile(file) {
      if (!file) return;
      if (file.size > 5 * 1024 * 1024) {
        if (!confirm(`图片 ${fmtSize(file.size)}，会让 posts.js 明显变大。继续？`)) return;
      }
      const url = await fileToDataURL(file);
      const alt = file.name.replace(/\.[^.]+$/, '');
      insertAtCursor(`<img src="${url}" alt="${escapeHtml(alt)}">`);
      toast(`已插入图片（${fmtSize(file.size)}）`, 'success');
    }

    async function handleAudioFile(file) {
      if (!file) return;
      if (file.size > 8 * 1024 * 1024) {
        if (!confirm(`音频 ${fmtSize(file.size)}，会让 posts.js 明显变大。继续？`)) return;
      }
      const url = await fileToDataURL(file);
      insertAtCursor(`<audio controls src="${url}"></audio>`);
      toast(`已插入音频（${fmtSize(file.size)}）`, 'success');
    }

    /* ───── Recorder ───── */

    let recState = { mediaRecorder: null, chunks: [], stream: null, startTs: 0, timer: null, blob: null };

    function openRecModal() {
      $('recModal').classList.add('show');
      $('recTime').textContent = '00:00';
      $('recStartBtn').style.display = '';
      $('recStopBtn').style.display = 'none';
      $('recPreview').style.display = 'none';
      $('recInsertBtn').style.display = 'none';
      recState.blob = null;
    }

    function closeRecModal() {
      stopRecordingHard();
      $('recModal').classList.remove('show');
    }

    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recState.stream = stream;
        recState.chunks = [];
        const mr = new MediaRecorder(stream);
        recState.mediaRecorder = mr;
        mr.ondataavailable = e => { if (e.data.size) recState.chunks.push(e.data); };
        mr.onstop = () => {
          const type = mr.mimeType || 'audio/webm';
          const blob = new Blob(recState.chunks, { type });
          recState.blob = blob;
          const url = URL.createObjectURL(blob);
          const a = $('recPreview');
          a.src = url;
          a.style.display = 'block';
          $('recInsertBtn').style.display = '';
        };
        mr.start();
        recState.startTs = Date.now();
        $('recStartBtn').style.display = 'none';
        $('recStopBtn').style.display = '';
        $('recordBtn').classList.add('recording');
        recState.timer = setInterval(() => {
          const s = Math.floor((Date.now() - recState.startTs) / 1000);
          const m = Math.floor(s / 60).toString().padStart(2, '0');
          const ss = (s % 60).toString().padStart(2, '0');
          $('recTime').textContent = `${m}:${ss}`;
        }, 200);
      } catch (err) {
        toast('无法访问麦克风：' + err.message, 'danger');
      }
    }

    function stopRecording() {
      if (recState.mediaRecorder && recState.mediaRecorder.state !== 'inactive') {
        recState.mediaRecorder.stop();
      }
      if (recState.stream) recState.stream.getTracks().forEach(t => t.stop());
      if (recState.timer) clearInterval(recState.timer);
      $('recStartBtn').style.display = 'none';
      $('recStopBtn').style.display = 'none';
      $('recordBtn').classList.remove('recording');
    }

    function stopRecordingHard() {
      stopRecording();
      recState.blob = null;
    }

    async function insertRecording() {
      if (!recState.blob) return;
      if (recState.blob.size > 8 * 1024 * 1024) {
        if (!confirm(`录音 ${fmtSize(recState.blob.size)}，会让 posts.js 明显变大。继续？`)) return;
      }
      const r = new FileReader();
      r.onload = () => {
        insertAtCursor(`<audio controls src="${r.result}"></audio>`);
        closeRecModal();
        toast(`已插入录音（${fmtSize(recState.blob.size)}）`, 'success');
      };
      r.readAsDataURL(recState.blob);
    }

    /* ───── Toast ───── */

    let toastTimer;
    function toast(msg, type = '') {
      const t = $('toast');
      t.textContent = msg;
      t.className = 'toast ' + type + ' show';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
    }

    /* ───── Init ───── */

    function init() {
      loadData();
      renderFilter();
      renderPosts();
      $('trashCount').textContent = state.trash.length ? `(${state.trash.length})` : '';

      if (sessionStorage.getItem(SESS_AUTH) === '1') enterAdmin();

      $('logoDot').addEventListener('dblclick', () => {
        if (document.body.classList.contains('admin')) return;
        tryUnlock();
      });

      $('newPostBtn').addEventListener('click', () => openEdit(null));
      $('trashBtn').addEventListener('click', showTrashView);
      $('backFromTrashBtn').addEventListener('click', showPostsView);
      $('exportBtn').addEventListener('click', exportJson);
      $('resetBtn').addEventListener('click', resetLocal);
      $('logoutBtn').addEventListener('click', logout);

      $('saveEditBtn').addEventListener('click', saveEdit);
      $('cancelEditBtn').addEventListener('click', closeEdit);
      $('editModal').addEventListener('click', e => {
        if (e.target === $('editModal')) closeEdit();
      });

      // Password modal eye toggle
      $('pwToggle').addEventListener('click', togglePwVisible);
      $('pwModal').addEventListener('click', e => {
        if (e.target === $('pwModal')) closePwModal();
      });

      // Editor toolbar
      $('insertImgBtn').addEventListener('click', () => $('imgFileInput').click());
      $('imgFileInput').addEventListener('change', e => {
        handleImageFile(e.target.files[0]);
        e.target.value = '';
      });
      $('insertAudioBtn').addEventListener('click', () => $('audioFileInput').click());
      $('audioFileInput').addEventListener('change', e => {
        handleAudioFile(e.target.files[0]);
        e.target.value = '';
      });
      $('insertH3Btn').addEventListener('click', () => insertAtCursor('<h3>小标题</h3>'));
      $('insertPBtn').addEventListener('click', () => insertAtCursor('<p>段落内容</p>'));
      $('insertListBtn').addEventListener('click', () => insertAtCursor('<ul>\n  <li>条目</li>\n  <li>条目</li>\n</ul>'));

      // Recorder
      $('recordBtn').addEventListener('click', openRecModal);
      $('recStartBtn').addEventListener('click', startRecording);
      $('recStopBtn').addEventListener('click', stopRecording);
      $('recInsertBtn').addEventListener('click', insertRecording);
      $('recCancelBtn').addEventListener('click', closeRecModal);
      $('recModal').addEventListener('click', e => {
        if (e.target === $('recModal')) closeRecModal();
      });

      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
          if ($('editModal').classList.contains('show')) closeEdit();
          else if ($('pwModal').classList.contains('show')) closePwModal();
          else if ($('recModal').classList.contains('show')) closeRecModal();
        }
      });
    }

    init();
  </script>
</body>
</html>
